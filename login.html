
<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Gym Management</title>

  <!-- Bootstrap -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <!-- Bootstrap Icons -->
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
  />

  <!-- CSS riêng -->
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="login-page">

  <div class="container">
    <div class="row min-vh-100 justify-content-center align-items-center">
      <div class="col-12 col-sm-10 col-md-8 col-lg-5">
        <div class="card login-card shadow-lg border-0">
          <div class="card-body p-4 p-md-5">
            <div class="text-center mb-4">
              <div class="logo-circle mb-3">
                <i class="bi bi-barbell"></i>
              </div>
              <h2 class="fw-bold">Gym Management</h2>
              <p class="text-muted mb-0">Hệ thống quản lý phòng gym</p>
            </div>

            <form id="loginForm">
              <div class="mb-3">
                <label class="form-label">Tên đăng nhập</label>
                <div class="input-group">
                  <span class="input-group-text">
                    <i class="bi bi-person"></i>
                  </span>
                  <input
                    type="text"
                    class="form-control"
                    id="username"
                    placeholder="Nhập tên đăng nhập"
                    required
                  />
                </div>
              </div>

              <div class="mb-3">
                <label class="form-label">Mật khẩu</label>
                <div class="input-group">
                  <span class="input-group-text">
                    <i class="bi bi-lock"></i>
                  </span>
                  <input
                    type="password"
                    class="form-control"
                    id="password"
                    placeholder="Nhập mật khẩu"
                    required
                  />
                </div>
              </div>

              <div class="d-flex justify-content-between align-items-center mb-3">
                <div class="form-check">
                  <input class="form-check-input" type="checkbox" id="rememberMe" />
                  <label class="form-check-label" for="rememberMe">
                    Ghi nhớ đăng nhập
                  </label>
                </div>
                <a href="#" class="small text-decoration-none">Quên mật khẩu?</a>
              </div>

              <button type="submit" class="btn btn-primary w-100 mb-3">
                <i class="bi bi-box-arrow-in-right me-2"></i>Đăng nhập
              </button>

              <button type="button" class="btn btn-outline-dark w-100">
                <i class="bi bi-camera-video me-2"></i>Đăng nhập bằng khuôn mặt
              </button>
            </form>

            <p class="text-center mt-4 mb-0 text-muted small">
              Demo Day 1: bấm đăng nhập để sang dashboard
            </p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="js/main.js"></script>
</body>
</html>
